[project]
name = "myapp"
root = "src"            
entry = "main"         
out_dir = "dist"       

[build]
odin_cmd = "odin"       
default_profile = "dev"
default_target = "host"
collections = { src = "src" }

[profiles.dev]
flags = ["-debug"]
defines = { LOG_LEVEL = "debug" }

[profiles.release]
flags = ["-o:speed", "-no-bounds-check"]
defines = { LOG_LEVEL = "info" }

[targets.host]
triple = "host"

[targets.windows-amd64]
triple = "windows_amd64"
flags = []
defines = {}

[deps]
odin_steamworks = { git = "https://github.com/jakubtomsu/odin-steamworks", rev = "ca307bcd51d849508d26988fbda0d4cdde9a6e68" }

[tasks.greet]
cmd = ["echo", "greet"]

[tasks.greet_with_dep]
deps = ["greet"]
cmd = ["echo", "greet_with_dep"]

[tasks.a]
deps = ["b"]
cmd = ["echo", "a"]

[tasks.b]
deps = ["a"]
cmd = ["echo", "b"]

[tasks.vars_test]
cmd = ["echo", "{name}", "{cache_dir}", "{bin_dir}"]
