[project]
name = "myapp"
root = "src"            
entry = "main"         
out_dir = "dist"       

[build]
odin_cmd = "odin"       
default_profile = "dev"
default_target = "host"
collections = { src = "src" }

[profiles.dev]
flags = ["-debug"]
defines = { LOG_LEVEL = "debug" }

[profiles.release]
flags = ["-o:speed", "-no-bounds-check"]
defines = { LOG_LEVEL = "info" }

[targets.host]
triple = "host"

[targets.windows-amd64]
triple = "windows_amd64"
flags = []
defines = {}

[deps]
stb = { git = "https://github.com/nothings/stb", rev = "a1b2c3d4" }
mylib = { path = "../libs/mylib" }

[tasks.greet]
cmd = ["echo", "greet"]

[tasks.greet_with_dep]
deps = ["greet"]
cmd = ["echo", "greet_with_dep"]

[tasks.a]
deps = ["b"]
cmd = ["echo", "a"]

[tasks.b]
deps = ["a"]
cmd = ["echo", "b"]
